<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>我的旅程助手</title>
    <!-- 引入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 React 與 ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <!-- 引入 Babel 供瀏覽器直接解析 JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        body { -webkit-tap-highlight-color: transparent; }
        @keyframes flashHighlight {
            0% { background-color: #bfdbfe; } 
            100% { background-color: transparent; }
        }
        .highlight-flash { animation: flashHighlight 1.5s ease-out; }
    </style>
</head>
<body class="bg-gray-100 flex justify-center h-[100dvh] overflow-hidden text-gray-800">

    <div id="root" class="w-full h-[100dvh] max-w-7xl"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- 內建圖示 (SVG Components) ---
        const Icon = ({ path, size = 20, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className} dangerouslySetInnerHTML={{ __html: path }} />
        );
        const Icons = {
            Calendar: '<rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line>',
            MapPin: '<path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path><circle cx="12" cy="10" r="3"></circle>',
            Navigation: '<polygon points="3 11 22 2 13 21 11 13 3 11"></polygon>',
            FileText: '<path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline>',
            MessageSquare: '<path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>',
            Edit2: '<path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"></path>',
            Check: '<polyline points="20 6 9 17 4 12"></polyline>',
            Clock: '<circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline>',
            Plus: '<line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line>',
            Trash2: '<polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line>',
            ArrowUp: '<line x1="12" y1="19" x2="12" y2="5"></line><polyline points="5 12 12 5 19 12"></polyline>',
            ArrowDown: '<line x1="12" y1="5" x2="12" y2="19"></line><polyline points="19 12 12 19 5 12"></polyline>',
            ArrowLeft: '<line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline>',
            ArrowRight: '<line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline>',
            Edit3: '<path d="M12 20h9"></path><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"></path>',
            Train: '<rect x="4" y="3" width="16" height="16" rx="2" ry="2"></rect><path d="M4 11h16"></path><path d="M12 3v8"></path><path d="M8 19l-2 3"></path><path d="M16 19l2 3"></path><path d="M8 15h0"></path><path d="M16 15h0"></path>',
            Footprints: '<path d="M4 16v-2.38C4 11.5 2.97 10.5 3 8c.03-2.72 1.49-6 4.5-6C9.37 2 10 3.8 10 5.5c0 3.11-2 5.66-2 8.68V16a2 2 0 1 1-4 0Z"></path><path d="M20 20v-2.38c0-2.12 1.03-3.12 1-5.62-.03-2.72-1.49-6-4.5-6C14.63 6 14 7.8 14 9.5c0 3.11 2 5.66 2 8.68V20a2 2 0 1 0 4 0Z"></path><path d="M16 17h4"></path><path d="M4 13h4"></path>',
            ExternalLink: '<path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path><polyline points="15 3 21 3 21 9"></polyline><line x1="10" y1="14" x2="21" y2="3"></line>',
            Maximize2: '<polyline points="15 3 21 3 21 9"></polyline><polyline points="9 21 3 21 3 15"></polyline><line x1="21" y1="3" x2="14" y2="10"></line><line x1="3" y1="21" x2="10" y2="14"></line>',
            X: '<line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line>',
            Download: '<path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line>',
            Upload: '<path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line>',
            Car: '<path d="M19 17h2c.6 0 1-.4 1-1v-3c0-.9-.7-1.7-1.5-1.9C18.7 10.6 16 10 16 10s-1.3-1.4-2.2-2.3c-.5-.4-1.1-.7-1.8-.7H5c-.6 0-1.1.4-1.4.9l-1.4 2.9A3.7 3.7 0 0 0 2 12v4c0 .6.4 1 1 1h2"></path><circle cx="7" cy="17" r="2"></circle><path d="M9 17h6"></path><circle cx="17" cy="17" r="2"></circle>',
            Bike: '<circle cx="5.5" cy="17.5" r="3.5"></circle><circle cx="18.5" cy="17.5" r="3.5"></circle><path d="M15 6a1 1 0 1 0 0-2 1 1 0 0 0 0 2zm-3 11.5V14l-3-3 4-3 2 3h2"></path>',
            GitBranch: '<line x1="6" y1="3" x2="6" y2="15"></line><circle cx="18" cy="6" r="3"></circle><circle cx="6" cy="18" r="3"></circle><path d="M18 9a9 9 0 0 1-9 9"></path>',
            Share2: '<circle cx="18" cy="5" r="3"></circle><circle cx="6" cy="12" r="3"></circle><circle cx="18" cy="19" r="3"></circle><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"></line><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"></line>'
        };

        const initialItineraryData = [{ 
            date: '2026-04-01', 
            spots: [{ 
                id: 's1', type: 'spot', name: '成田機場', arrivalTime: '11:00', departureTime: '12:30', cost: '', notes: '範例行程', 
                activeTransportPlanId: 'tp_init',
                transportPlans: [{ id: 'tp_init', name: '方案 1', steps: [] }]
            }] 
        }];
        
        const initialFilesData = [{ id: 'f1', title: '預設檔案', url: 'https://google.com', type: 'link' }];

        const defaultPhrases = [
            { id: 'p1', text: '請問這個多少錢？ (How much is this?)' },
            { id: 'p2', text: '請問洗手間在哪裡？ (Where is the restroom?)' },
            { id: 'p3', text: '我要點這個，謝謝。 (I would like to order this, thank you.)' }
        ];

        const migrateTripData = (data) => {
            const migrateSpot = (spot) => {
                if (spot.type === 'spot' && !spot.transportPlans) {
                    const existingSteps = spot.transportToNext || [];
                    const planId = "tp_" + Date.now() + "_" + Math.random().toString(36).substr(2,9);
                    spot.transportPlans = [{ id: planId, name: '方案 1', steps: existingSteps }];
                    spot.activeTransportPlanId = planId;
                    delete spot.transportToNext;
                }
            };
            data.forEach(day => {
                day.spots.forEach(item => {
                    if (item.type === 'spot') migrateSpot(item);
                    else if (item.type === 'branch') {
                        item.plans.forEach(plan => plan.spots.forEach(migrateSpot));
                    }
                });
            });
            return data;
        };

        function App() {
            const [activeTab, setActiveTab] = useState('itinerary'); 
            const [isEditMode, setIsEditMode] = useState(false);
            
            // --- 多行程管理狀態 ---
            const [trips, setTrips] = useState(() => {
                const savedTrips = localStorage.getItem('tripsData');
                if (savedTrips) {
                    const parsed = JSON.parse(savedTrips);
                    parsed.forEach(t => { t.itinerary = migrateTripData(t.itinerary); });
                    return parsed;
                } else {
                    const savedItinerary = localStorage.getItem('itineraryData');
                    const savedFiles = localStorage.getItem('filesData');
                    
                    let legacyItinerary = savedItinerary ? JSON.parse(savedItinerary) : initialItineraryData;
                    let legacyFiles = savedFiles ? JSON.parse(savedFiles) : initialFilesData;
                    legacyItinerary = migrateTripData(legacyItinerary);
                    
                    return [{
                        id: "trip_default",
                        name: '我的預設行程',
                        itinerary: legacyItinerary,
                        files: legacyFiles
                    }];
                }
            });

            const [activeTripId, setActiveTripId] = useState(() => {
                const saved = localStorage.getItem('activeTripId');
                return saved || (trips[0] ? trips[0].id : "");
            });

            const [currentDateIndex, setCurrentDateIndex] = useState(0);
            
            const [phrases, setPhrases] = useState(() => {
                const saved = localStorage.getItem('phrasesData');
                return saved ? JSON.parse(saved) : defaultPhrases;
            });
            const [marqueeText, setMarqueeText] = useState(() => localStorage.getItem('marqueeData') || '請問到車站怎麼走？');
            
            const [isFullScreenText, setIsFullScreenText] = useState(false);
            const [highlightSpotId, setHighlightSpotId] = useState(null); 
            const fileInputRef = useRef(null);
            const [modalConfig, setModalConfig] = useState({ isOpen: false, type: 'alert', title: '', message: '', inputValue: '', onConfirm: null });

            const activeTrip = trips.find(t => t.id === activeTripId) || trips[0];
            const itinerary = activeTrip.itinerary;
            const files = activeTrip.files || [];

            useEffect(() => {
                if (!trips.find(t => t.id === activeTripId)) {
                    setActiveTripId(trips[0] ? trips[0].id : "");
                }
            }, [trips, activeTripId]);

            useEffect(() => { setCurrentDateIndex(0); }, [activeTripId]);

            useEffect(() => { localStorage.setItem('tripsData', JSON.stringify(trips)); }, [trips]);
            useEffect(() => { localStorage.setItem('activeTripId', activeTripId); }, [activeTripId]);
            useEffect(() => { localStorage.setItem('phrasesData', JSON.stringify(phrases)); }, [phrases]);
            useEffect(() => { localStorage.setItem('marqueeData', marqueeText); }, [marqueeText]);

            const activeDay = itinerary[currentDateIndex] || { date: '', spots: [] };

            const closeModal = () => setModalConfig(prev => ({ ...prev, isOpen: false }));
            const showAlert = (title, message) => setModalConfig({ isOpen: true, type: 'alert', title: title, message: message, inputValue: '', onConfirm: closeModal });
            const showConfirm = (title, message, onConfirmAction) => setModalConfig({ isOpen: true, type: 'confirm', title: title, message: message, inputValue: '', onConfirm: () => { onConfirmAction(); closeModal(); } });
            const showPrompt = (title, message, defaultValue, onConfirmAction) => setModalConfig({ isOpen: true, type: 'prompt', title: title, message: message, inputValue: defaultValue, onConfirm: (val) => { onConfirmAction(val); closeModal(); } });

            const handleAddTrip = () => {
                showPrompt('新增行程', '請為新行程命名 (例如：3月關西賞櫻)：', '新行程', (val) => {
                    if (val) {
                        const newTrip = {
                            id: "trip_" + Date.now(),
                            name: val,
                            itinerary: [{ date: new Date().toLocaleDateString('en-CA'), spots: [] }],
                            files: []
                        };
                        setTrips(prev => [...prev, newTrip]);
                        setActiveTripId(newTrip.id);
                    }
                });
            };

            const handleRenameTrip = () => {
                showPrompt('重新命名', '請輸入行程的新名稱：', activeTrip.name, (val) => {
                    if (val) { setTrips(prev => prev.map(t => t.id === activeTripId ? { ...t, name: val } : t)); }
                });
            };

            const handleDeleteTrip = () => {
                if (trips.length <= 1) {
                    showAlert('無法刪除', '這是您最後一個行程，無法刪除！您可以選擇重新命名或先新增另一個行程。');
                    return;
                }
                showConfirm('刪除行程', "確定要刪除「" + activeTrip.name + "」嗎？這個行程的所有景點與檔案都會消失且無法復原喔！", () => {
                    setTrips(prev => prev.filter(t => t.id !== activeTripId));
                });
            };

            const mutateItinerary = (recipe) => {
                setTrips(prev => {
                    const draft = JSON.parse(JSON.stringify(prev));
                    const trip = draft.find(t => t.id === activeTripId);
                    if (trip) recipe(trip.itinerary);
                    return draft;
                });
            };

            const updateFiles = (newFiles) => {
                setTrips(prev => prev.map(t => t.id === activeTripId ? { ...t, files: newFiles } : t));
            };

            // --- 智慧到站提醒 (背景自動巡檢) ---
            const latestItinerary = useRef(itinerary);
            useEffect(() => { latestItinerary.current = itinerary; }, [itinerary]);

            useEffect(() => {
                const reqPerm = () => { 
                    if ('Notification' in window && Notification.permission === 'default') Notification.requestPermission(); 
                    window.removeEventListener('click', reqPerm); 
                };
                window.addEventListener('click', reqPerm);

                const timer = setInterval(() => {
                    const now = new Date();
                    const todayStr = now.toLocaleDateString('en-CA');
                    const currentDay = latestItinerary.current.find(d => d.date === todayStr);
                    if (!currentDay) return;

                    const currentHHMM = now.toTimeString().substring(0, 5);

                    const extractTransitSteps = (spots) => {
                        let steps = [];
                        spots.forEach(s => {
                            if (s.type === 'spot') {
                                // 移除 ?. 改用 &&
                                let tp = null;
                                if (s.transportPlans) {
                                    tp = s.transportPlans.find(p => p.id === s.activeTransportPlanId);
                                }
                                if (tp) tp.steps.forEach(st => { if (st.type === 'transit' && st.arrivalTime) steps.push({ spotName: s.name, ...st }); });
                            } else if (s.type === 'branch') {
                                const plan = s.plans.find(p => p.id === s.activePlanId);
                                if (plan) steps.push(...extractTransitSteps(plan.spots));
                            }
                        });
                        return steps;
                    };

                    const stepsToday = extractTransitSteps(currentDay.spots);
                    
                    stepsToday.forEach(step => {
                        if (!step.arrivalTime) return;
                        
                        let parts = step.arrivalTime.split(':');
                        let h = Number(parts[0]);
                        let m = Number(parts[1]);
                        m -= 5;
                        if (m < 0) { m += 60; h -= 1; }
                        if (h < 0) h += 24;
                        const preHHMM = String(h).padStart(2,'0') + ":" + String(m).padStart(2,'0');

                        const alertKey5m = "alert-5m-" + step.id + "-" + todayStr;
                        const alertKey0m = "alert-0m-" + step.id + "-" + todayStr;

                        if (currentHHMM === preHHMM && !localStorage.getItem(alertKey5m)) {
                            const msg = "您搭乘的 [" + (step.info || "車次") + "] 預計再 5 分鐘後抵達 " + (step.arrivalStation || "目的地") + "，請準備下車！";
                            setModalConfig({ isOpen: true, type: 'alert', title: '🔔 即將到站提醒', message: msg, inputValue: '', onConfirm: () => setModalConfig(p=>({...p, isOpen:false})) });
                            if ('Notification' in window && Notification.permission === 'granted') new Notification('即將到站提醒', { body: msg });
                            localStorage.setItem(alertKey5m, 'true');
                        }
                        
                        if (currentHHMM === step.arrivalTime && !localStorage.getItem(alertKey0m)) {
                            const msg = "您搭乘的 [" + (step.info || "車次") + "] 應該已經抵達 " + (step.arrivalStation || "目的地") + " 囉！";
                            setModalConfig({ isOpen: true, type: 'alert', title: '📍 到站提醒', message: msg, inputValue: '', onConfirm: () => setModalConfig(p=>({...p, isOpen:false})) });
                            if ('Notification' in window && Notification.permission === 'granted') new Notification('到站提醒', { body: msg });
                            localStorage.setItem(alertKey0m, 'true');
                        }
                    });
                }, 30000);

                return () => clearInterval(timer);
            }, []);

            const extractNumber = (str) => {
                if (!str) return 0;
                const match = String(str).match(/[\d,]+/g);
                return match ? parseInt(match.join('').replace(/,/g, ''), 10) : 0;
            };

            const calculateDailyTotal = (spots) => {
                let total = 0;
                spots.forEach(spot => {
                    if (spot.type === 'spot') {
                        total += extractNumber(spot.cost);
                        let tp = null;
                        if (spot.transportPlans) {
                            tp = spot.transportPlans.find(p => p.id === spot.activeTransportPlanId);
                        }
                        if (tp) tp.steps.forEach(step => total += extractNumber(step.cost));
                    } else if (spot.type === 'branch') {
                        const plan = spot.plans.find(p => p.id === spot.activePlanId);
                        if (plan) total += calculateDailyTotal(plan.spots);
                    }
                });
                return total;
            };

            const handleCopyShare = () => {
                if (!activeDay || activeDay.spots.length === 0) {
                    showAlert('提示', '今日尚無行程可以分享！');
                    return;
                }

                let textToShare = "📅 " + activeDay.date + " " + activeTrip.name + "\n\n";

                const formatSpotToText = (spot) => {
                    if (spot.name && spot.name.trim() !== '') {
                        let timeStr = "";
                        if (spot.arrivalTime) {
                            if (spot.departureTime) {
                                timeStr = "[" + spot.arrivalTime + "~" + spot.departureTime + "] ";
                            } else {
                                timeStr = "[" + spot.arrivalTime + "] ";
                            }
                        }
                        textToShare += "📍 " + timeStr + spot.name + "\n";
                    }
                    
                    let activeTp = n
